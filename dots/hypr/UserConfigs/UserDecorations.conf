# Decoration Settings

# Hyprland Wiki Links
# Animation - https://wiki.hyprland.org/Configuring/Animations/
# Decoration - https://wiki.hyprland.org/Configuring/Variables/#decoration

# Sourcing colors generated by wallust
source = $HOME/.config/hypr/wallust/wallust-hyprland.conf

general {
  border_size = 0 # default is 2
  gaps_in = 4 # default is 2
  gaps_out = 8 # default is 4
  gaps_workspaces = 100

  #col.active_border = $color12
  #col.inactive_border = $color10
}

decoration {
  rounding = 18 # default is 10
  rounding_power = 2.4
  
  active_opacity = 1.5 # default 1.0
  inactive_opacity = 1.5 # default 0.9
  fullscreen_opacity = 1.0

  #dim_inactive = true
  #dim_strength = 0.05 # default 0.1
  #dim_special = 0.07 # default 0.8

  shadow {
    enabled = false # true by default
    range = 3
    render_power = 1

    #color =  $color12
    #color_inactive = $color10
  }

  blur {
    enabled = true
    size = 6
    passes = 3
    new_optimizations = true
    xray = true
    ignore_opacity = true
    special = true
    popups = true
  }
}

group {
  #col.border_active = $color15

	groupbar {
		#col.active = $color0
  }
}
